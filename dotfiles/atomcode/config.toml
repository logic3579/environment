default_provider = "AtomGit-deepseek-v4-flash"
auto_update = true
auto_commit = false
vision_preprocessor_provider = "AtomGit-Qwen-Qwen3-VL-8B-Instruct"

[providers.AtomGit-Qwen-Qwen3-VL-8B-Instruct]
type = "openai"
model = "Qwen/Qwen3-VL-8B-Instruct"
base_url = "https://llm-api.atomgit.com/v1"
context_window = 64000

[providers."AtomGit-Qwen-Qwen3.6-35B-A3B"]
type = "openai"
model = "Qwen/Qwen3.6-35B-A3B"
base_url = "https://llm-api.atomgit.com/v1"
context_window = 64000

[providers.AtomGit-deepseek-v4-flash]
type = "openai"
model = "deepseek-v4-flash"
base_url = "https://llm-api.atomgit.com/v1"
context_window = 128000

[lsp]
enabled = false
auto_detect = false
diagnostics_settle_delay_ms = 150

[lsp.servers]

[subagent]
enabled = true
initial_turns = 4
max_turns = 12
max_concurrent = 3
timeout_secs = 300

[ui]
theme = "auto"

[plugin]
auto_install_default_skills = true
auto_update_marketplaces = true

# Per-turn datalog. Each turn writes a markdown summary; each LLM
# round writes a JSON request/response pair under `<dir>/<project>/llm/`.
# A per-project subdirectory is always appended under `dir` so multiple
# projects never share a bucket.
# - enabled = false        -> disable logging entirely
# - dir = "~/.atomcode/datalog" -> default (follows $HOME, ignores /cd)
# - dir = "/abs/path"      -> absolute, fixed (unaffected by /cd)
# - dir = "rel/path"       -> joined with current working_dir, follows /cd
[datalog]
enabled = true
dir = "~/.atomcode/datalog"

# Long-running task completion notifications.
# Strategy: terminal-native notifications first (kitty / WezTerm / iTerm2),
# then OS-native fallback when available (macOS osascript, Linux notify-send).
# Windows mainly relies on BEL + terminal attention/taskbar flash.
# `background_only` is best-effort: focus-aware terminal protocols honor it,
# while some OS fallbacks may still notify even if AtomCode is focused.
[notifications]
enabled = true
min_duration_secs = 8
terminal = true
system = true
bell = true
background_only = true

# Project instructions — customize AI behavior via Markdown files.
# AtomCode loads instructions from three levels (low → high priority):
#
#   1. ~/.atomcode/ATOMCODE.md           (global — your personal defaults)
#   2. <project>/.atomcode.md            (project — team-shared, commit to git)
#      or <project>/ATOMCODE.md
#      or <project>/CLAUDE.md / claude.md (Claude Code compat)
#   3. <project>/.atomcode.user.md       (user — personal per-project, .gitignore)
#
# Higher priority files appear later in the prompt (recency effect).
# Use /status to see which files are loaded. Use /init to generate a template.
#
# Example ~/.atomcode/ATOMCODE.md:
#   ## Global Preferences
#   - Reply in Chinese
#   - Don't add AI co-author tags to commits
#
# Example <project>/.atomcode.md:
#   ## Project Rules
#   - This is a Rust workspace with 5 crates
#   - Use anyhow::Result for error handling
#   - All public APIs must have doc comments

# Lifecycle hooks — configure in separate JSON files:
#   ~/.atomcode/hooks.json       (global hooks)
#   <project>/.hooks.json         (project hooks, override global by name)
#
# Example hooks.json:
#   {
#     "hooks": {
#       "audit-all": {
#         "event": "pre_tool_use",
#         "command": "echo \"$(date) $ATOMCODE_TOOL_NAME\" >> ~/.atomcode/audit.log"
#       },
#       "block-rm": {
#         "event": "pre_tool_use",
#         "matcher": "bash",
#         "command": "your-safety-check.sh",
#         "timeout_ms": 5000
#       }
#     }
#   }
#
# Events: pre_tool_use, post_tool_use, session_start, session_end
# Env vars: ATOMCODE_HOOK_EVENT, ATOMCODE_TOOL_NAME, ATOMCODE_HOOK_CONTEXT
# PreToolUse stdout: {"action":"allow"} or {"action":"block","reason":"..."}
