# ============================================================================
# Alacritty — cross-platform terminal config
# ============================================================================
# Mirrors the WezTerm setup (../wezterm/wezterm.lua) where Alacritty's feature
# set allows: Solarized Dark, MesloLGMDZ Nerd Font Mono @ 17pt, 97x23 startup,
# 0.93 opacity, 10k scrollback.
#
# Intentional differences from WezTerm:
#   - No built-in tabs / panes / launch menu (Alacritty is deliberately
#     minimal — use tmux on top for multiplexing).
#   - No font fallback list — Alacritty defers to OS-level fallback for
#     CJK / emoji glyphs (Core Text on macOS, DirectWrite on Windows).
#   - Shell override is opt-in: Alacritty defaults to $SHELL on macOS/Linux
#     and cmd.exe on Windows. Uncomment the [terminal.shell] block below to
#     point Windows at Git Bash.
#
# Install path:
#   macOS / Linux : ~/.config/alacritty/alacritty.toml
#   Windows       : %APPDATA%\alacritty\alacritty.toml
# ============================================================================

[general]
live_config_reload = true

# -- Window ------------------------------------------------------------------
[window]
dimensions = { columns = 97, lines = 23 }
padding = { x = 0, y = 0 }
opacity = 0.93
dynamic_title = true
decorations = "Full"
# macOS-only: let the Option key send ESC so Alt+Left/Right word jump works.
# Silently ignored on Windows / Linux.
option_as_alt = "Both"

# -- Scrolling ---------------------------------------------------------------
[scrolling]
history = 10000

# -- Font --------------------------------------------------------------------
[font]
size = 17.0
normal      = { family = "MesloLGMDZ Nerd Font Mono", style = "Regular" }
bold        = { family = "MesloLGMDZ Nerd Font Mono", style = "Bold" }
italic      = { family = "MesloLGMDZ Nerd Font Mono", style = "Italic" }
bold_italic = { family = "MesloLGMDZ Nerd Font Mono", style = "Bold Italic" }

# -- Colors (Solarized Dark — https://ethanschoonover.com/solarized/) --------
[colors.primary]
background = "#002b36"
foreground = "#839496"

[colors.cursor]
text   = "#002b36"
cursor = "#839496"

[colors.normal]
black   = "#073642"
red     = "#dc322f"
green   = "#859900"
yellow  = "#b58900"
blue    = "#268bd2"
magenta = "#d33682"
cyan    = "#2aa198"
white   = "#eee8d5"

[colors.bright]
black   = "#002b36"
red     = "#cb4b16"
green   = "#586e75"
yellow  = "#657b83"
blue    = "#839496"
magenta = "#6c71c4"
cyan    = "#93a1a1"
white   = "#fdf6e3"

# -- Cursor & Bell -----------------------------------------------------------
[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[bell]
animation = "EaseOutExpo"
duration = 0
color = "#ffffff"

# -- Selection ---------------------------------------------------------------
[selection]
save_to_clipboard = true

# -- Terminal / Shell --------------------------------------------------------
# Defaults: macOS / Linux inherit $SHELL (zsh in this setup); Windows uses
# cmd.exe. Uncomment one block below to override.
#
# Windows + Git Bash:
# [terminal.shell]
# program = "D:\\Software\\Git\\bin\\bash.exe"
# args    = ["--login"]
#
# Windows + PowerShell:
# [terminal.shell]
# program = "pwsh.exe"
#
# macOS / Linux explicit zsh login:
# [terminal.shell]
# program = "/bin/zsh"
# args    = ["--login"]

# -- Keybindings -------------------------------------------------------------
# Alacritty's built-in defaults already cover the common cases per platform
# (macOS: Cmd+C/V/N/=/-/0/Return; Linux+Windows: Ctrl+Shift+C/V/N).
# Only additions below.
[keyboard]
bindings = [
    # Universal paste via Shift+Insert
    { key = "Insert", mods = "Shift", action = "Paste" },
    # ALT+Left / ALT+Right → readline word jump (bash / zsh)
    { key = "Left",   mods = "Alt",   chars = "\u001bb" },
    { key = "Right",  mods = "Alt",   chars = "\u001bf" },
]
