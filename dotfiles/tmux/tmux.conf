# Fork from https://github.com/gpakosz/.tmux

# -- general -------------------------------------------------------------------

unbind C-b
set -g prefix C-z
bind C-z send-prefix
# set -g prefix2 C-a
# bind C-a send-prefix -2

set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"  # advertise truecolor to inner apps (nvim solarized etc.)
set -g focus-events on                       # forward terminal focus events (nvim autoread, gitsigns refresh)
set -s escape-time 0                         # no delay on <Esc> in nvim insert/normal switch
setw -g aggressive-resize on                 # resize windows to smallest viewing client, not session-wide
set -g history-limit 50000
# set -g word-separators "!\"#$%&'()*+,-./:;<=>?@[\\]^`{|}~"
set -g word-separators "!\"#$%&'()*+,:;<=>?@[\\]^`{|}"

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

set -g set-clipboard on
bind-key -n MouseDown3Pane run "tmux paste-buffer"

# -- copy mode -----------------------------------------------------------------

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection

bind b list-buffers
bind p paste-buffer -p


# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

# status line — semi710/minimal-tmux-status owns layout; we set palette + content
# Solarized: bg = blue accent (matches former active-window colour33); fg = base02 dark text
set -g status-interval 15
set -g @minimal-tmux-status "top"
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-bg "#268bd2"
set -g @minimal-tmux-fg "#073642"
# Session name doubles as prefix indicator — lights up blue when C-z is held
set -g @minimal-tmux-indicator-str " #S "
set -g @minimal-tmux-status-right "#(tmux-mem-cpu-load -c -v -i 5 -m 0 -t 0)  #{battery_color_fg} #{battery_icon_status} #{battery_percentage} #[default]  #[fg=colour230,bg=colour58] %F %H:%M #[default] "
set -g status-left-length 40
set -g status-right-length 120

# activity
set -g monitor-activity on
set -g visual-activity off
setw -g monitor-bell off


# -- navigation ----------------------------------------------------------------

# create session
bind C-c new-session

# switch session
bind Tab switch-client -n

# window management
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-q kill-pane
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
# bind -n M-Space next-layout

# window navigation
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
# bind -n -r M-p previous-window
# bind -n -r M-n next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-z resize-pane -Z

# pane navigation
bind 1 select-pane -t:.1
bind 2 select-pane -t:.2
bind 3 select-pane -t:.3
bind 4 select-pane -t:.4
bind 5 select-pane -t:.5
bind 6 select-pane -t:.6
bind 7 select-pane -t:.7
bind 8 select-pane -t:.8
bind 9 select-pane -t:.9
bind 0 select-pane -t:.10
# Smart M-h/j/k/l: forward to vim if pane is running vim/nvim, otherwise switch tmux pane.
# Pairs with the christoomey/vim-tmux-navigator plugin on the nvim side.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
bind > swap-pane -D
bind < swap-pane -U
bind | swap-pane


# -- plugin --------------------------------------------------------------------
# Tmux Plugin Manager
# install plugins = prefix + I
# update plugins = prefix + U
# remove plugins = prefix + alt + u

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'semi710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-battery'
# Nerd Font glyphs for battery state (MesloLGMDZ has these)
set -g @batt_icon_status_charged ''
set -g @batt_icon_status_charging ''
set -g @batt_icon_status_discharging ''
set -g @batt_icon_status_attached ''
set -g @batt_icon_status_unknown '?'
# Force battery_color_fg to emit a fixed dark teal bg (colour23) regardless of
# tier/state — overrides the default colour0 (black) secondary plane.
set -g @batt_color_charge_secondary_tier8 'colour23'
set -g @batt_color_charge_secondary_tier7 'colour23'
set -g @batt_color_charge_secondary_tier6 'colour23'
set -g @batt_color_charge_secondary_tier5 'colour23'
set -g @batt_color_charge_secondary_tier4 'colour23'
set -g @batt_color_charge_secondary_tier3 'colour23'
set -g @batt_color_charge_secondary_tier2 'colour23'
set -g @batt_color_charge_secondary_tier1 'colour23'
set -g @batt_color_status_secondary_charged 'colour23'
set -g @batt_color_status_secondary_charging 'colour23'
set -g @batt_color_status_secondary_discharging 'colour23'
set -g @batt_color_status_secondary_attached 'colour23'
set -g @batt_color_status_secondary_unknown 'colour23'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Automatic tpm installation
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
if "test ! -d ~/.tmux/resurrect" \
   "run 'mkdir ~/.tmux/resurrect'"
if "test ! -f /opt/homebrew/bin/tmux-mem-cpu-load" \
   "run 'ln -sF ~/.tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load /opt/homebrew/bin/tmux-mem-cpu-load'"

# Changing plugins install dir
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
